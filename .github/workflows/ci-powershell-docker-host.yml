name: CI (Docker host)

# Delegates to the shared Docker host CI workflow in Common-PowerShell.
# Kept as a local file so pull_request triggers work for this repo,
# and so release.yml can call it via workflow_call.
on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  ci-docker-host:
    uses: Klark-Morrigan/Common-PowerShell/.github/workflows/ci-powershell-docker-host.yml@master
