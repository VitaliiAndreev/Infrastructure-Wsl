name: CI (Docker target)

# Delegates to the shared Docker target CI workflow in Common-PowerShell.
# Tests run on the hosted runner and connect via SSH to a Docker container
# (the target), so Docker access from the test process itself is required.
# Kept as a local file so pull_request triggers work for this repo.
on:
  pull_request:
    branches: [ main, master ]
  workflow_call:
  workflow_dispatch:

jobs:
  ci-docker-target:
    uses: Klark-Morrigan/Common-PowerShell/.github/workflows/ci-powershell-docker-target.yml@master
