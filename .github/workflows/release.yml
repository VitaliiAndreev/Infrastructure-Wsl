name: Release

# WSL module has no integration tests of its own (the functions wrap
# wsl.exe; the unit tests mock that boundary). The Docker host/target CI
# workflows are still wired in for parity with the other modules - each
# scans for integration tests and exits early as a no-op when none exist.

on:
  push:
    branches:
      - master
    paths:
      # Only fire when the manifest itself changes, not on every push.
      - 'Infrastructure.Wsl/Infrastructure.Wsl.psd1'
  workflow_dispatch:

jobs:
  check-version:
    runs-on: windows-latest
    outputs:
      version_is_new: ${{ steps.check.outputs.version_is_new }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check version is new
        id: check
        uses: Klark-Morrigan/Common-PowerShell/.github/actions/check-version-is-new@master
        with:
          psd1: 'Infrastructure.Wsl\Infrastructure.Wsl.psd1'

      # Gate the release on the manifest and changelog agreeing. A new
      # version that has not been promoted in CHANGELOG.md fails here,
      # before any tag or publish, so notes can never lag the release.
      - name: Assert changelog version
        if: steps.check.outputs.version_is_new == 'true'
        uses: Klark-Morrigan/Common-PowerShell/.github/actions/assert-changelog-version@master
        with:
          psd1: 'Infrastructure.Wsl\Infrastructure.Wsl.psd1'
          changelog: CHANGELOG.md

  test-unit:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: Klark-Morrigan/Common-PowerShell/.github/workflows/ci-powershell.yml@master

  # Docker host/target integration workflows. This module has no
  # integration tests, so each scans, finds none, and exits early as a
  # no-op - kept for parity so the release shape matches the other modules.
  test-integration-host:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: Klark-Morrigan/Common-PowerShell/.github/workflows/ci-powershell-docker-host.yml@master

  test-integration-target:
    needs: check-version
    if: needs.check-version.outputs.version_is_new == 'true'
    uses: Klark-Morrigan/Common-PowerShell/.github/workflows/ci-powershell-docker-target.yml@master

  # Tag, publish to PSGallery, and cut the GitHub Release in one shared
  # back-end workflow - see release-tail.yml in Common-PowerShell.
  release-tail:
    needs: [ check-version, test-unit, test-integration-host, test-integration-target ]
    if: needs.check-version.outputs.version_is_new == 'true'
    permissions:
      contents: write
    uses: Klark-Morrigan/Common-PowerShell/.github/workflows/release-tail.yml@master
    with:
      psd1: 'Infrastructure.Wsl\Infrastructure.Wsl.psd1'
      module-path: Infrastructure.Wsl
      changelog: CHANGELOG.md
    secrets:
      PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
